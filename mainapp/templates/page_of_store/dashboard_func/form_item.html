{% load static %}
<form method="post" class="store-form" enctype="multipart/form-data" action="{% url 'dashboard' %}">
    {% csrf_token %}
    <input type="hidden" name="action" value="create_product">
    <input type="hidden" name="store_id" value="{{ selected_store.id }}">

    <div class="store-form__group">
        <label for="item-name">Назва товару</label>
        <input id="item-name" type="text" name="name" placeholder="Наприклад: Гумова Качечка" required>
    </div>

    <div class="store-form__group">
        <label for="item-description">Опис товару</label>
        <textarea id="item-description" name="description" rows="4" placeholder="Коротко опишіть ваш товар"></textarea>
    </div>

    <div class="store-form__group">
        <label for="item-price">Ціна в грн</label>
        <input id="item-price" type="number" name="price" step="0.01" required>
    </div>

    <div class="store-form__group">
        <label for="item-image">Зображення</label>
        <input id="item-image" type="file" name="image">
    </div>

    <div class="store-form__group">
        <label for="item-category">Категорія</label>
        <select id="item-category" name="category">
            <option value="">Оберіть категорію</option>
            {% for category in product_form.fields.category.queryset %}
                <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="store-form__actions">
        <button type="button" class="btn btn-light" id="cancelItemsModal">Скасувати</button>
        <button type="submit" class="btn btn-primary">Створити товар</button>
    </div>
</form>
