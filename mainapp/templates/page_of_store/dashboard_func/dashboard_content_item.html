{% load static %}

<section class="dashboard-products panel">
    <div class="dashboard-block__head">
        <h3>Мої товари</h3>
        <a href="#">Всі товари</a>
    </div>

    <div class="seller-products-table">
        <div class="seller-products-table__head">
        <span>Товар</span>
        <span>Ціна</span>
        <span>Статус</span>
        <span>Дії</span>
        </div>

        {% for product in products %}
            <div class="seller-product-row">
                <div class="seller-product-main">
                    <div class="seller-product-image">
                        {% if product.image %}
                            <img src="{{ product.image.url }}" alt="{{ product.name }}">
                        {% else %}
                            <img src="{% static 'img/product-placeholder.png' %}" alt="Product">
                        {% endif %}
                    </div>

                    <div class="seller-product-info">
                        <strong>{{ product.name }}</strong>
                        <small>{{ product.description }}</small>
                    </div>
                </div>

                <div class="seller-product-price">{{ product.price }} ₴</div>

                <div class="seller-product-status">
                    <span class="status-badge status-instock">В наявності</span>
                </div>

                <div class="seller-product-actions">
                    <button class="btn btn-secondary btn-sm" type="button">Змінити</button>
                    <button class="btn btn-danger btn-sm" type="button">Видалити</button>
                </div>
            </div>
            {% empty %}
                <p>Товарів поки немає.</p>
            {% endfor %}

        <div class="seller-product-actions">
            <button class="btn btn-secondary btn-sm" type="button">Змінити</button>
            <button class="btn btn-danger btn-sm" type="button">Видалити</button>
        </div>
        </div>
    </div>
    </section>
