{% load static %}
<div class="product-grid" id="product-list">
  {% for product in products %}
    <!-- Загортаємо картку в посилання. Клас product-card залишено на <a>, щоб CSS працював без змін -->
    <a href="{% url 'card_product' %}" class="product-card" style="display: block; text-decoration: none; color: inherit;">
      <div class="product-image">
        <div class="product-image-frame">
          {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
          {% else %}
            <img src="{% static 'img/product-placeholder.png' %}" alt="Product">
          {% endif %}
        </div>
      </div>
      <div class="product-body">
        <div class="product-meta">
          <span>{{ product.store.name|default:"-" }}</span>
          <span>{{ product.category.name|default:"Без категорії" }}</span>
        </div>
        <h3 class="product-title">{{ product.name }}</h3>
        <div class="product-bottom">
          <div class="price">
            <strong>{{ product.price }} ₴</strong>
          </div>
          
          {% if not is_seller %}
            <form action="{% url 'add_to_cart' product.id %}" method="post" class="add-to-cart-form">
              {% csrf_token %}
              <!-- event.stopPropagation() блокує перехід за посиланням при кліку на кнопку -->
              <button 
                type="button" 
                class="btn btn-primary add-to-cart" 
                onclick="event.stopPropagation(); window.addToCart(this)"
              >
                В кошик
              </button>
            </form>
          {% endif %}
        </div>
      </div>
    </a>
  {% endfor %}
</div>
